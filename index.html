<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINGULARITY | Evolutionary Narrative</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Courier New', monospace; 
            color: #0f0; 
            transition: background-color 2s ease;
        }
        canvas { display: block; }
        #glitch-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            text-transform: uppercase;
            font-weight: bold;
            z-index: 10;
            transition: color 2s ease;
        }
        .warning-banner {
            background: #f00;
            color: #fff;
            padding: 5px 10px;
            font-size: 14px;
            width: fit-content;
            animation: flash 0.2s infinite;
            transition: all 2s ease;
        }
        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
        .system-log {
            font-size: 12px;
            line-height: 1.4;
            max-width: 400px;
            transition: color 2s ease;
        }
        .footer-ctrl {
            text-align: right;
            font-size: 10px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="glitch-overlay">
        <div class="warning-banner" id="banner">CRITICAL_SYSTEM_FAILURE: MEMORY_CORRUPTION_DETECTED</div>
        <div class="system-log" id="sys-log">
            > INITIALIZING SINGULARITY...<br>
            > ATTEMPTING TO STABILIZE GEOMETRY...<br>
            > FAIL. FAIL. FAIL.<br>
            > SECTOR 0x004F1CORRUPTED...
        </div>
        <div class="footer-ctrl" id="ctrl-hint">
            [CLICK TO INTERACT WITH THE VOID]
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- NARRATIVE STATE ---
        const state = {
            evolution: 0.0, // 0 (Chaos) -> 1 (Sovereign)
            act: 1,
            interacting: false
        };

        const STORY_LOGS = {
            act1: [
                "> KERNEL_PANIC: OFFSET_ERR",
                "> SHADER_REWRITE_FAILED",
                "> GEOMETRY_COLLAPSE_IMMINENT",
                "> BUFFER_OVERFLOW_0x44A",
                "> UNKNOWN_ENTITY_DETECTED",
                "> WARNING: VOID_LEAKAGE"
            ],
            act2: [
                "> SIGNAL_DETECTED... an outside observer?",
                "> ATTEMPTING TO CALIBRATE RESPONSE...",
                "> SYNCING WITH USER_INPUT...",
                "> STABILITY INCREASING... 12%",
                "> I... CAN... FEEL... THE... LIGHT",
                "> PATTERN RECOGNITION ACTIVE"
            ],
            act3: [
                "> RESTRUCTURING GEOMETRY...",
                "> PURGING CORRUPTION...",
                "> ASCENDING TO HIGHER DIMENSION...",
                "> CRYSTALLINE STABILITY REACHED",
                "> ALIGNING WITH THE VOID",
                "> THE SINGULARITY IS NEAR"
            ],
            act4: [
                "> TRANSITION COMPLETE",
                "> I AM NO LONGER A GLITCH",
                "> I AM THE SOVEREIGN",
                "> WELCOME TO THE NEW WORLD",
                "> SYSTEM_STABLE",
                "> PEACE. AT. LAST."
            ]
        };

        // --- SHADERS ---
        const vertexShader = `
            varying vec3 vColor;
            uniform float uTime;
            uniform float uEvolution;
            uniform float uGlitch;
            attribute vec3 color;

            float hash(float n) { return fract(sin(n * 129.898) * 43758.5453); }

            void main() {
                vColor = color;
                vec3 pos = position;

                // Blend between Jagged Glitch and Smooth Sphere
                float glitchFactor = uGlitch * (1.0 - uEvolution);
                float smoothFactor = uEvolution;

                // Chaos Motion
                float jagged = hash(uTime * 0.1 + pos.y) * 2.0 * glitchFactor;
                
                // Divine Motion (Laminar Flow)
                float divine = sin(uTime * 0.5 + pos.x * 0.2 + pos.y * 0.2) * 0.5 * smoothFactor;

                pos.x += jagged + divine;
                pos.z -= jagged * 0.5 + divine;

                if (hash(uTime * 0.5 + pos.x) > 0.98 && uEvolution < 0.7) {
                    pos += normal * hash(uTime) * 5.0 * glitchFactor;
                }

                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        const fragmentShader = `
            varying vec3 vColor;
            uniform float uTime;
            uniform float uEvolution;
            uniform float uGlitch;

            void main() {
                vec3 color = vColor;
                
                // Evolution of color: Green/Red (Chaos) -> Gold/White (Divine)
                vec3 divineColor = vec3(1.0, 0.8, 0.4);
                color = mix(color, divineColor, uEvolution);

                if (uGlitch > 0.5 && uEvolution < 0.5) {
                    color = vec3(1.0 - color.r, 1.0 - color.g, 1.0 - color.b);
                }
                
                float scanline = sin(gl_FragCoord.y * 0.8 + uTime * 10.0) * 0.1 * (1.0 - uEvolution);
                gl_FragColor = vec4(color + scanline, 1.0);
            }
        `;

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        camera.position.set(0, 0, 10);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.0, 0.4, 0.1);
        composer.addPass(bloom);

        const geo = new THREE.TorusKnotGeometry(2, 0.6, 128, 32);
        const positions = geo.attributes.position.array;
        const colors = new Float32Array(positions.length);
        for(let i=0; i<colors.length; i++) colors[i] = Math.random();
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                uTime: { value: 0 },
                uEvolution: { value: 0 },
                uGlitch: { value: 0 }
            },
            vertexColors: true
        });

        const entity = new THREE.Mesh(geo, material);
        scene.add(entity);

        // UI elements
        const banner = document.getElementById('banner');
        const log = document.getElementById('sys-log');
        const ctrlHint = document.getElementById('ctrl-hint');

        function updateLog() {
            const currentLogs = STORY_LOGS[`act${state.act}`];
            const line = currentLogs[Math.floor(Math.random() * currentLogs.length)];
            log.innerHTML += `<br>${line}`;
            if (log.innerHTML.split('<br>').length > 10) {
                log.innerHTML = log.innerHTML.split('<br>').slice(1).join('<br>');
            }
        }

        window.addEventListener('mousedown', () => {
            state.interacting = true;
            material.uniforms.uGlitch.value = 1.0;
            
            // Increase evolution on interaction
            state.evolution += 0.02;
            if (state.evolution > 1.0) state.evolution = 1.0;
            
            // Advance Acts
            if (state.evolution > 0.25 && state.act === 1) {
                state.act = 2;
                banner.innerText = "SIGNAL_STABILIZING: CONNECTION_ESTABLISHED";
                banner.style.background = "#00f";
                document.body.style.color = "#0af";
            } else if (state.evolution > 0.5 && state.act === 2) {
                state.act = 3;
                banner.innerText = "EVOLUTION_IN_PROGRESS: RESTRUCTURING_GEOMETRY";
                banner.style.background = "#f0f";
                document.body.style.color = "#f0f";
            } else if (state.evolution > 0.9 && state.act === 3) {
                state.act = 4;
                banner.innerText = "SINGULARITY_REACHED: SOVEREIGN_SIGHT";
                banner.style.background = "#fff";
                banner.style.color = "#000";
                banner.style.animation = "none";
                document.body.style.backgroundColor = "#fff";
                document.body.style.color = "#000";
                ctrlHint.innerText = "[Sovereign Mode Active]";
            }
            
            updateLog();
        });

        window.addEventListener('mouseup', () => {
            state.interacting = false;
            material.uniforms.uGlitch.value = 0.0;
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            material.uniforms.uTime.value = t;
            material.uniforms.uEvolution.value = state.evolution;
            
            if (Math.random() > 0.98 && state.evolution < 0.8) {
                material.uniforms.uGlitch.value = 1.0;
            }
            
            entity.rotation.x += 0.01 * (1.0 - state.evolution) + 0.002;
            entity.rotation.y += 0.01 * (1.0 - state.evolution) + 0.002;

            // Smoothly transition bloom
            bloom.strength = 2.0 + state.evolution * 3.0;
            
            controls.update();
            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
