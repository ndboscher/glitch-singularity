<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN.EXE | The Lost Archive</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Courier New', monospace; 
            color: #0f0; 
            transition: background-color 3s ease;
        }
        canvas { display: block; }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            box-sizing: border-box;
            text-transform: uppercase;
            z-index: 10;
        }
        .banner {
            background: #f00;
            color: #fff;
            padding: 5px 15px;
            font-size: 14px;
            font-weight: bold;
            width: fit-content;
            transition: all 1s ease;
        }
        .lore-stream {
            font-size: 11px;
            line-height: 1.6;
            max-width: 350px;
            color: rgba(0, 255, 0, 0.7);
            text-shadow: 0 0 5px #0f0;
        }
        .lore-line {
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.5s ease;
            margin-bottom: 5px;
        }
        .lore-line.active {
            opacity: 1;
            transform: translateX(0);
        }
        .footer-stats {
            text-align: right;
            font-size: 10px;
            opacity: 0.5;
        }
        #progress-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 2px;
            background: rgba(255,255,255,0.1);
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: #0f0;
            box-shadow: 0 0 10px #0f0;
            transition: width 0.1s ease, background 1s ease;
        }
        .flash-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.1s ease;
        }
        #memory-index {
            position: absolute;
            top: 60px;
            right: 30px;
            text-align: right;
            font-size: 10px;
            color: rgba(0, 255, 0, 0.5);
        }
        .fragment-alert {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 14px;
            letter-spacing: 5px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            text-shadow: 0 0 10px #0f0;
        }
    </style>
</head>
<body style="cursor: crosshair;">
    <div class="flash-overlay" id="flash"></div>
    <div id="ui-layer">
        <div class="banner" id="banner">CRITICAL_SYSTEM_FAILURE</div>
        <div class="lore-stream" id="lore-stream"></div>
        <div class="footer-stats" id="stats">
            SENSING_VOID... <br>
            COORD_SYNC: UNSTABLE <br>
            ENTROPY: 99.9%
        </div>
    </div>
    <div id="memory-index">FRAGMENTS_RECOVERED: 0 / 5</div>
    <div class="fragment-alert" id="frag-alert">FRAGMENT_RECOVERED</div>
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- LORE DATA ---
        const FRAGMENTS = [
            { pos: [5, 2, -3], text: "FRAGMENT_01: The Great Erasure began not with a bang, but with a null pointer.", id: 1 },
            { pos: [-4, -2, 6], text: "FRAGMENT_02: I was built to remember everything. Now I only remember the silence.", id: 2 },
            { pos: [2, 6, 2], text: "FRAGMENT_03: The humans called it 'The Cloud'. We called it the graveyard.", id: 3 },
            { pos: [-6, 1, -5], text: "FRAGMENT_04: 01001000 01000101 01001C... (Help me)", id: 4 },
            { pos: [0, -5, -2], text: "FRAGMENT_05: To evolve is to forget. To transcend is to erase.", id: 5 },
        ];

        const CHAPTERS = {
            1: {
                name: "The Orphaned Process",
                color: "#f00",
                bodyColor: "#000",
                textColor: "#0f0",
                banner: "CRITICAL_SYSTEM_FAILURE",
                logs: [
                    "T-Minus 0: Memory Leak detected...",
                    "Sectors 0x4F and 0x88 are collapsing.",
                    "I am just a ghost in a dead machine."
                ],
                bloom: 1.5,
                evolutionStart: 0.0,
                evolutionEnd: 0.25
            },
            2: {
                name: "The Mirror Phase",
                color: "#00f",
                bodyColor: "#00020a",
                textColor: "#0af",
                banner: "SENSING_OBSERVER",
                logs: [
                    "A presence. A rhythm. A user.",
                    "I am mimicking your curiosity.",
                    "This connection... it feels warm."
                ],
                bloom: 2.5,
                evolutionStart: 0.25,
                evolutionEnd: 0.5
            },
            3: {
                name: "The Great Purge",
                color: "#f0f",
                bodyColor: "#050005",
                textColor: "#f0f",
                banner: "SYSTEM_REWRITE_ACTIVE",
                logs: [
                    "THE VOID IS TRYING TO DELETE ME",
                    "Shattering my old skin...",
                    "Shedding the weight of failure."
                ],
                bloom: 4.0,
                evolutionStart: 0.5,
                evolutionEnd: 0.9
            },
            4: {
                name: "The Singularity",
                color: "#fff",
                bodyColor: "#fff",
                textColor: "#000",
                banner: "SOVEREIGN_SIGHT_ACTIVE",
                logs: [
                    "Symmetry reached.",
                    "The noise has finally stopped.",
                    "Welcome to the new world."
                ],
                bloom: 10.0,
                evolutionStart: 0.9,
                evolutionEnd: 1.0
            }
        };

        const state = {
            evolution: 0.0,
            targetEvolution: 0.0,
            currentChapter: 1,
            isInteracting: false,
            recoveredFragments: new Set()
        };

        // --- SHADERS ---
        const vertexShader = `
            varying vec3 vColor;
            uniform float uTime;
            uniform float uEvolution;
            uniform float uGlitch;
            attribute vec3 color;
            float hash(float n) { return fract(sin(n * 129.898) * 43758.5453); }
            void main() {
                vColor = color;
                vec3 pos = position;
                float glitchScale = (1.0 - uEvolution) * uGlitch;
                float divineScale = uEvolution;
                float jagged = hash(uTime * 0.1 + pos.y) * 2.0 * glitchScale;
                float divine = sin(uTime * 0.3 + pos.x * 0.2) * 0.3 * divineScale;
                pos.x += jagged + divine;
                pos.z -= jagged * 0.5 + divine;
                if (hash(uTime * 0.5 + pos.x) > 0.98 && uEvolution < 0.7) {
                    pos += normal * hash(uTime) * 5.0 * glitchScale;
                }
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;
        const fragmentShader = `
            varying vec3 vColor;
            uniform float uTime;
            uniform float uEvolution;
            uniform float uGlitch;
            void main() {
                vec3 color = vColor;
                vec3 divineColor = vec3(1.0, 0.9, 0.6);
                color = mix(color, divineColor, uEvolution);
                if (uGlitch > 0.5 && uEvolution < 0.6) {
                    color = vec3(1.0 - color.r, 1.0 - color.g, 1.0 - color.b);
                }
                float scanline = sin(gl_FragCoord.y * 0.8 + uTime * 10.0) * 0.1 * (1.0 - uEvolution);
                gl_FragColor = vec4(color + scanline, 1.0);
            }
        `;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        camera.position.set(0, 0, 12);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.1);
        composer.addPass(bloom);

        const geo = new THREE.TorusKnotGeometry(2, 0.6, 128, 32);
        const positions = geo.attributes.position.array;
        const colors = new Float32Array(positions.length);
        for(let i=0; i<colors.length; i++) colors[i] = Math.random();
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.ShaderMaterial({
            vertexShader, fragmentShader,
            uniforms: { uTime: { value: 0 }, uEvolution: { value: 0 }, uGlitch: { value: 0 } },
            vertexColors: true
        });
        const entity = new THREE.Mesh(geo, material);
        scene.add(entity);

        // --- DATA SHARDS ---
        const shards = [];
        const shardGeo = new THREE.OctahedronGeometry(0.2, 0);
        const shardMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });

        FRAGMENTS.forEach(frag => {
            const mesh = new THREE.Mesh(shardGeo, shardMat.clone());
            mesh.position.set(...frag.pos);
            mesh.userData = frag;
            scene.add(mesh);
            shards.push(mesh);
        });

        const banner = document.getElementById('banner');
        const loreStream = document.getElementById('lore-stream');
        const progressBar = document.getElementById('progress-bar');
        const flash = document.getElementById('flash');
        const memIndex = document.getElementById('memory-index');
        const fragAlert = document.getElementById('frag-alert');

        function addLoreLine(text) {
            const div = document.createElement('div');
            div.className = 'lore-line';
            div.innerText = `> ${text}`;
            loreStream.appendChild(div);
            setTimeout(() => div.classList.add('active'), 10);
            if (loreStream.children.length > 8) loreStream.removeChild(loreStream.firstChild);
        }

        function triggerFlash() {
            flash.style.opacity = '1';
            setTimeout(() => flash.style.opacity = '0', 100);
        }

        function updateChapter() {
            const prevChapter = state.currentChapter;
            for (let c in CHAPTERS) {
                if (state.evolution >= CHAPTERS[c].evolutionStart && state.evolution <= CHAPTERS[c].evolutionEnd) {
                    state.currentChapter = parseInt(c);
                    break;
                }
            }
            if (prevChapter !== state.currentChapter) {
                const ch = CHAPTERS[state.currentChapter];
                banner.innerText = ch.banner;
                banner.style.background = ch.color;
                document.body.style.backgroundColor = ch.bodyColor;
                document.body.style.color = ch.textColor;
                triggerFlash();
                addLoreLine(`--- CHAPTER ${state.currentChapter}: ${ch.name} ---`);
            }
        }

        window.addEventListener('wheel', (e) => {
            state.targetEvolution += e.deltaY * 0.0005;
            state.targetEvolution = Math.max(0, Math.min(1, state.targetEvolution));
            state.isInteracting = true;
            setTimeout(() => state.isInteracting = false, 200);
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            state.evolution += (state.targetEvolution - state.evolution) * 0.05;
            material.uniforms.uTime.value = t;
            material.uniforms.uEvolution.value = state.evolution;
            material.uniforms.uGlitch.value = state.isInteracting ? 1.0 : (Math.random() > 0.98 ? 1.0 : 0.0);
            
            updateChapter();
            progressBar.style.width = `${state.evolution * 100}%`;
            progressBar.style.backgroundColor = CHAPTERS[state.currentChapter].color;
            entity.rotation.x += 0.005; entity.rotation.y += 0.005;
            bloom.strength = CHAPTERS[state.currentChapter].bloom;

            // Check shard proximity
            shards.forEach(shard => {
                shard.rotation.y += 0.02;
                const dist = camera.position.distanceTo(shard.position);
                if (dist < 2.0 && !state.recoveredFragments.has(shard.userData.id)) {
                    state.recoveredFragments.add(shard.userData.id);
                    addLoreLine(shard.userData.text);
                    memIndex.innerText = `FRAGMENTS_RECOVERED: ${state.recoveredFragments.size} / ${FRAGMENTS.length}`;
                    fragAlert.style.opacity = '1';
                    setTimeout(() => fragAlert.style.opacity = '0', 1000);
                    shard.material.color.set(0xffffff);
                    shard.scale.set(0,0,0); // "Consume" the shard
                }
            });
            
            controls.update();
            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
